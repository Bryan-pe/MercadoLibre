<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="icons/doodle_cat.png">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/shop_style.css">
    <title>Document</title>
</head>
<body>
    <header class="header">
        <!--fila superior-->
        <div class="header-top">
            <div class="logos">
                <a href="index.html"><img src="img/logo.png" alt="logo mercado libre"></a>
            </div>
            <div class="buscador">
                <form>
                    <input type="text" placeholder="Buscar productos, marcas y mas...">
                    <button type="submit">
                        <img src="icons/lupa.png" alt="buscador">
                    </button>
                </form>
            </div>
            <img src="img/meli.png" alt=" logo mercado libre" class="img-banner">
        </div>
        <!--barra de navegacion-->
        <nav class="nav">
            <ul class="menu-left">
                <li><a href="catalogo.html">Catalogo</a></li>
                <li><a href="#">Ofertas</a></li>
                <li><a href="#">Cupones</a></li>
                <li><a href="#">Supermercado</a></li>
                <li><a href="#">Moda</a></li>
                <li><a href="#">Mercado Play</a></li>
                <li><a href="#">Vender</a></li>
                <li><a href="#">Ayuda</a></li>
            </ul>
            <ul class="menu-right">
                <li><a href="registro.html">Crea tu cuenta</a></li>
                <li><a href="#"></a>Ingresa</li>
                <li><a href="#"></a>Mis compras</li>
                <li>
                    <a href="carrito.html">
                        <img src="icons/carrito.png" class="img-carrito">
                    </a>
                </li>
            </ul>
        </nav>
    </header>
    <main class="shop-cont">
        <!--lista de productos-->
        <div class="prods-shop">
            <h2>Productos</h2>
            <div class="prod-shop">
                <img src="img/red1.jpg">
                <div class="info-shop">
                    <h3>Redmagic 11 Air 5g</h3>
                    <p class="precio-shop">$13,476</p>
                    <div class="cantidad-shop">
                        <button>-</button>
                        <span>1</span>
                        <button>+</button>
                    </div>
                </div>
            </div>
        </div>

        <!--resumen-->
        <div class="resumen-shop">
            <h3>Resumen de compra</h3>
            <p>Producto: $13,476</p>
            <p>Envio: Gratis</p>
            <h2>Total: $13,476</h2>
            <button>Continuar compra</button>
        </div>
    </main>
    <footer>
        <p>© 2026 Mercado Libre</p>
    </footer>
</body>
</html>
