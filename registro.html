<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="icons/doodle_cat.png">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/login_style.css">
    <title>Document</title>
</head>
<body>
    <header class="header-login">
        <a href="index.html"><img src="img/logo.png" alt="logo mercado libre"></a>
    </header>
    <main class="login-cont">
        <!--izquierda-->
        <div class="login-info">
            <h1>Ingresa tu email o telefono<br>para iniciar sesion</h1>
            <div class="help-box">
                <p>Tengo un problema de seguridad</p>
            </div> 
            <a href="#" class="help-link">Necesito ayuda</a>
        </div>

        <!--derecha-->
        <div class="login-box">
            <!--registro-->
            <div id="registro" class="form-section">
                <h2>Crear cuenta</h2>
                <form id="form-reg">
                    <label>Nombre</label>
                    <input type="text">
                    
                    <label>Email</label>
                    <input type="email">

                    <label>Contraseña</label>
                    <input type="password">

                    <button type="submit" class="btn-primary">Registrarse</button>
                </form>
                <a href="#login" class="switch-link">Ya tengo cuenta</a>
            </div>

            <!--login-->
            <div id="login" class="form-section">
                <h2>Iniciar sesion</h2>
                <form id="form-log">
                    <label>Email o telefono</label>
                    <input type="text">

                    <label>Contraseña</label>
                    <input type="password">

                    <button type="submit" class="btn-primary">Continuar</button>
                </form>
                <a href="#registro" class="switch-link">Crear cuenta</a>
            </div>
        </div>
    </main>
    <script src="js/auth.js"></script>
    <footer class="footer-login">
        <p>Como cuidamos tu privacidad - Copyright © 1999-2026</p>
    </footer>
</body>
</html>
